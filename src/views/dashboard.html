<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold">Active Monitors</h1>
    <a href="/" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">+ New</a>
  </div>

  <div id="monitor-list" class="space-y-3">
    <div class="text-center py-8 text-gray-400">Loading...</div>
  </div>
</div>

<style>
  .score-ring {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .score-ring-inner {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .seat-chip {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 11px; margin-right: 4px; margin-top: 2px;
  }
</style>

<script>
function scoreColor(score) {
  if (score >= 80) return '#48bb78';
  if (score >= 60) return '#4299e1';
  if (score >= 40) return '#ecc94b';
  if (score >= 20) return '#ed8936';
  return '#fc8181';
}

function renderScoreSection(score, top5, totalAvailable) {
  const chips = (top5 || []).map(s =>
    `<span class="seat-chip bg-gray-700 text-gray-200">${esc(s.seatName || s)}</span>`
  ).join('');
  if (score !== null && score !== undefined) {
    const color = scoreColor(score);
    return `
      <div class="flex items-center gap-3 mt-2">
        <div class="score-ring" style="background: conic-gradient(${color} ${score}%, #374151 0)">
          <div class="score-ring-inner bg-gray-900 text-white">${score}</div>
        </div>
        <div>
          <div class="text-xs text-gray-400 mb-1">${totalAvailable} seats available</div>
          <div>${chips}</div>
        </div>
      </div>`;
  }
  return `
    <div class="mt-2">
      <div class="text-xs text-gray-400 mb-1">${totalAvailable} seats available</div>
      <div>${chips}</div>
    </div>`;
}

function formatShowtimeDate(datetimeStr) {
  if (!datetimeStr) return '';
  try {
    const d = new Date(datetimeStr);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  } catch { return ''; }
}

async function loadMonitors() {
  const list = document.getElementById('monitor-list');
  try {
    const monitors = await fetchApi('/api/monitors');
    if (monitors.length === 0) {
      list.innerHTML = '<div class="text-center py-12 text-gray-400"><p class="mb-4">No monitors yet</p><a href="/" class="text-red-400 underline">Start monitoring a showtime</a></div>';
      return;
    }
    list.innerHTML = monitors.map(m => {
      const active = m.is_active ? 'border-green-600' : 'border-gray-700 opacity-60';
      const statusDot = m.is_active ? 'bg-green-500' : 'bg-gray-500';
      const lastCheck = m.last_checked_at ? timeAgo(m.last_checked_at) : 'never';
      const dateStr = formatShowtimeDate(m.showtime_datetime);

      let scoreHTML = '';
      if (m.lastScore !== null && m.lastScore !== undefined) {
        const top5 = Array.isArray(m.lastScore) ? m.lastScore : [];
        scoreHTML = renderScoreSection(null, top5, m.lastTotalAvailable);
      } else {
        scoreHTML = '<div class="text-xs text-gray-500 mt-1">No data yet</div>';
      }

      return `
        <div class="bg-gray-800 rounded-xl p-4 border ${active} space-y-2" id="monitor-${m.id}">
          <div class="flex items-start justify-between">
            <div>
              <div class="font-semibold">${esc(m.movie_title || 'Unknown Movie')}</div>
              <div class="text-sm text-gray-400">${esc(m.theatre_name)}</div>
              <div class="text-sm text-gray-400">${dateStr ? esc(dateStr) + ' · ' : ''}${esc(m.showtime_display)}</div>
            </div>
            <span class="flex items-center gap-1.5 text-xs">
              <span class="w-2 h-2 rounded-full ${statusDot}"></span>
              ${m.is_active ? 'Active' : 'Stopped'}
            </span>
          </div>
          ${scoreHTML}
          <div class="flex items-center gap-3 text-xs text-gray-500">
            <span>Last checked: ${lastCheck}</span>
            <span>|</span>
            <span>Every
              <select onchange="updateInterval(${m.id}, this.value)" class="bg-gray-700 text-gray-200 rounded px-1 py-0.5 text-xs">
                <option value="1" ${m.poll_interval_minutes===1?'selected':''}>1</option>
                <option value="2" ${m.poll_interval_minutes===2?'selected':''}>2</option>
                <option value="5" ${m.poll_interval_minutes===5?'selected':''}>5</option>
                <option value="10" ${m.poll_interval_minutes===10?'selected':''}>10</option>
              </select> min
            </span>
            <span>|</span>
            <span>Skip
              <select onchange="updateSkipRows(${m.id}, this.value)" class="bg-gray-700 text-gray-200 rounded px-1 py-0.5 text-xs">
                <option value="0" ${m.min_row===0?'selected':''}>0</option>
                <option value="2" ${m.min_row===2?'selected':''}>2</option>
                <option value="3" ${m.min_row===3?'selected':''}>3</option>
                <option value="4" ${m.min_row===4?'selected':''}>4</option>
                <option value="5" ${m.min_row===5?'selected':''}>5</option>
              </select> rows
            </span>
          </div>
          <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
            <input type="checkbox" ${m.notify_email ? 'checked' : ''}
              onchange="toggleNotify(${m.id}, this.checked)"
              class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-red-500 focus:ring-red-500">
            Send email notifications
          </label>
          <div class="flex gap-2">
            <button onclick="checkNow(${m.id})" class="flex-1 bg-gray-700 hover:bg-gray-600 text-sm py-2 rounded-lg transition">Check Now</button>
            ${m.is_active
              ? `<button onclick="stopMonitor(${m.id})" class="flex-1 bg-gray-700 hover:bg-red-700 text-sm py-2 rounded-lg transition text-red-400">Stop</button>`
              : `<button onclick="deleteMonitor(${m.id})" class="flex-1 bg-gray-700 hover:bg-red-700 text-sm py-2 rounded-lg transition text-red-400">Delete</button>`
            }
          </div>
          <div id="result-${m.id}" class="hidden"></div>
        </div>`;
    }).join('');
  } catch (err) {
    list.innerHTML = '<p class="text-center py-8 text-red-400">' + esc(err.message) + '</p>';
  }
}

async function toggleNotify(id, checked) {
  await fetchApi('/api/monitors/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notifyEmail: checked })
  });
}

async function updateInterval(id, value) {
  await fetchApi('/api/monitors/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pollInterval: parseInt(value) })
  });
}

async function updateSkipRows(id, value) {
  await fetchApi('/api/monitors/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ minRow: parseInt(value) })
  });
}

async function checkNow(id) {
  const el = document.getElementById('result-' + id);
  el.classList.remove('hidden');
  el.innerHTML = '<div class="flex items-center gap-2 text-xs text-gray-500 mt-1"><svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.3"></circle><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path></svg> Checking seats...</div>';
  try {
    const r = await fetchApi('/api/monitors/' + id + '/check', { method: 'POST' });
    el.innerHTML = renderScoreSection(r.score, r.top5, r.totalAvailable);
  } catch (err) {
    el.innerHTML = '<div class="text-xs text-red-400 mt-1">' + esc(err.message) + '</div>';
  }
}

async function stopMonitor(id) {
  await fetchApi('/api/monitors/' + id + '/stop', { method: 'POST' });
  loadMonitors();
}

async function deleteMonitor(id) {
  if (!confirm('Delete this monitor?')) return;
  await fetchApi('/api/monitors/' + id, { method: 'DELETE' });
  loadMonitors();
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  return Math.floor(mins / 60) + 'h ago';
}

loadMonitors();
setInterval(loadMonitors, 30000);
</script>
