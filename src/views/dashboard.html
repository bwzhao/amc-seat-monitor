<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold">Active Monitors</h1>
    <a href="/" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">+ New</a>
  </div>

  <div id="monitor-list" class="space-y-3">
    <div class="text-center py-8 text-gray-400">Loading...</div>
  </div>
</div>

<script>
async function loadMonitors() {
  const list = document.getElementById('monitor-list');
  try {
    const monitors = await fetchApi('/api/monitors');
    if (monitors.length === 0) {
      list.innerHTML = '<div class="text-center py-12 text-gray-400"><p class="mb-4">No monitors yet</p><a href="/" class="text-red-400 underline">Start monitoring a showtime</a></div>';
      return;
    }
    list.innerHTML = monitors.map(m => {
      const active = m.is_active ? 'border-green-600' : 'border-gray-700 opacity-60';
      const statusDot = m.is_active ? 'bg-green-500' : 'bg-gray-500';
      const lastCheck = m.last_checked_at ? timeAgo(m.last_checked_at) : 'never';
      return `
        <div class="bg-gray-800 rounded-xl p-4 border ${active} space-y-3">
          <div class="flex items-start justify-between">
            <div>
              <div class="font-semibold">${esc(m.movie_title || 'Unknown Movie')}</div>
              <div class="text-sm text-gray-400">${esc(m.theatre_name)}</div>
              <div class="text-sm text-gray-400">${esc(m.showtime_display)}</div>
            </div>
            <span class="flex items-center gap-1.5 text-xs">
              <span class="w-2 h-2 rounded-full ${statusDot}"></span>
              ${m.is_active ? 'Active' : 'Stopped'}
            </span>
          </div>
          <div class="text-xs text-gray-500 space-y-1">
            <div>Last checked: ${lastCheck}</div>
            <div>Min row: ${m.min_row} | Center bias: ${Math.round(m.center_bias*100)}% | Every ${m.poll_interval_minutes}min</div>
          </div>
          <div class="flex gap-2">
            <button onclick="checkNow(${m.id})" class="flex-1 bg-gray-700 hover:bg-gray-600 text-sm py-2 rounded-lg transition">Check Now</button>
            ${m.is_active
              ? `<button onclick="stopMonitor(${m.id})" class="flex-1 bg-gray-700 hover:bg-red-700 text-sm py-2 rounded-lg transition text-red-400">Stop</button>`
              : `<button onclick="deleteMonitor(${m.id})" class="flex-1 bg-gray-700 hover:bg-red-700 text-sm py-2 rounded-lg transition text-red-400">Delete</button>`
            }
          </div>
          <div id="result-${m.id}" class="hidden text-sm bg-gray-900 rounded-lg p-3 mt-2"></div>
        </div>`;
    }).join('');
  } catch (err) {
    list.innerHTML = '<p class="text-center py-8 text-red-400">' + esc(err.message) + '</p>';
  }
}

async function checkNow(id) {
  const el = document.getElementById('result-' + id);
  el.classList.remove('hidden');
  el.innerHTML = '<span class="text-gray-400">Checking...</span>';
  try {
    const r = await fetchApi('/api/monitors/' + id + '/check', { method: 'POST' });
    el.innerHTML = `<div class="text-green-400">Good seats: ${r.goodSeats}</div><div class="text-gray-400">Total available: ${r.totalAvailable}</div>`;
  } catch (err) {
    el.innerHTML = '<span class="text-red-400">' + esc(err.message) + '</span>';
  }
}

async function stopMonitor(id) {
  await fetchApi('/api/monitors/' + id + '/stop', { method: 'POST' });
  loadMonitors();
}

async function deleteMonitor(id) {
  if (!confirm('Delete this monitor?')) return;
  await fetchApi('/api/monitors/' + id, { method: 'DELETE' });
  loadMonitors();
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  return Math.floor(mins / 60) + 'h ago';
}

loadMonitors();
setInterval(loadMonitors, 30000);
</script>
