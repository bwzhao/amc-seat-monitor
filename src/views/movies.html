<div class="space-y-4">
  <div class="flex items-center gap-3">
    <a href="javascript:history.back()" class="text-gray-400 hover:text-white">&larr;</a>
    <h1 class="text-xl font-bold" id="page-title">Movies</h1>
  </div>

  <div id="movie-list" class="space-y-3">
    <div class="text-center py-8 text-gray-400">Loading movies...</div>
  </div>
</div>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const theatreId = params.get('theatreId');
  const theatreSlug = params.get('theatreSlug');
  const theatreName = params.get('theatreName') || '';
  if (!theatreId && !theatreSlug) return location.href = '/';

  document.getElementById('page-title').textContent = 'Movies at ' + decodeURIComponent(theatreName);
  const list = document.getElementById('movie-list');

  try {
    const key = theatreId || theatreSlug;
    const movies = await fetchApi('/api/movies?theatre=' + encodeURIComponent(key));
    if (movies.length === 0) {
      list.innerHTML = '<p class="text-center py-8 text-gray-400">No movies found for today.</p>';
      return;
    }
    list.innerHTML = movies.map(m => `
      <a href="/showtimes?theatreId=${theatreId}&theatreSlug=${theatreSlug}&theatreName=${encodeURIComponent(theatreName)}&movieId=${m.id}&movieSlug=${m.slug}&movieTitle=${encodeURIComponent(m.title)}"
         class="flex gap-4 bg-gray-800 rounded-xl p-4 hover:bg-gray-750 transition border border-gray-700 hover:border-red-500">
        ${m.posterUrl ? `<img src="${m.posterUrl}" class="w-16 h-24 object-cover rounded" alt="">` : '<div class="w-16 h-24 bg-gray-700 rounded flex items-center justify-center text-xs text-gray-500">No img</div>'}
        <div class="flex-1 min-w-0">
          <div class="font-semibold">${esc(m.title)}</div>
          <div class="text-sm text-gray-400 mt-1">
            ${m.rating ? '<span class="bg-gray-700 px-2 py-0.5 rounded text-xs">' + esc(m.rating) + '</span>' : ''}
            ${m.runtime ? '<span class="ml-2 text-xs">' + esc(m.runtime) + '</span>' : ''}
          </div>
        </div>
      </a>
    `).join('');
  } catch (err) {
    list.innerHTML = '<p class="text-center py-8 text-red-400">Failed to load movies: ' + esc(err.message) + '</p>';
  }
})();
</script>
