<div class="space-y-4">
  <div class="flex items-center gap-3">
    <a href="/" class="text-gray-400 hover:text-white">&larr;</a>
    <h1 class="text-xl font-bold">Theatres near "{{query}}"</h1>
  </div>

  <div id="theatre-list" class="space-y-3">
    <div class="text-center py-8 text-gray-400" id="loading">Loading theatres...</div>
  </div>
</div>

<script>
(async () => {
  const q = new URLSearchParams(location.search).get('q');
  if (!q) return location.href = '/';
  const list = document.getElementById('theatre-list');
  try {
    const theatres = await fetchApi('/api/theatres?q=' + encodeURIComponent(q));
    if (theatres.length === 0) {
      list.innerHTML = '<p class="text-center py-8 text-gray-400">No theatres found. Try a different search.</p>';
      return;
    }
    list.innerHTML = theatres.map(t => `
      <a href="/movies?theatreId=${t.id}&theatreSlug=${t.market ? t.market + '/' + t.slug : t.slug}&theatreName=${encodeURIComponent(t.name)}"
         class="block bg-gray-800 rounded-xl p-4 hover:bg-gray-750 transition border border-gray-700 hover:border-red-500">
        <div class="font-semibold">${esc(t.name)}</div>
        <div class="text-sm text-gray-400 mt-1">${esc([t.address, t.city, t.state, t.zipCode].filter(Boolean).join(', '))}</div>
      </a>
    `).join('');
  } catch (err) {
    list.innerHTML = '<p class="text-center py-8 text-red-400">Failed to load theatres: ' + esc(err.message) + '</p>';
  }
})();
</script>
